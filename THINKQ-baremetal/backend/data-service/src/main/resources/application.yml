server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:thinkq}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:thinkq}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        ssl: ${DB_SSL:false}
        sslmode: ${DB_SSL_MODE:disable}
        sslrootcert: ${DB_SSL_ROOT_CERT:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

security:
  internal-api-key: ${INTERNAL_API_KEY:}
